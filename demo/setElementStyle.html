<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>setElementStyle Demo - DOMKit</title>
</head>
<body>
    <div id="wrapper">
        <button id="myButton">Click Me!</button>
    </div>

    <script src="../src/domkit.styles.js"></script>

    </script>
</body>
</html>
