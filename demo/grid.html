<!DOCTYPE html>
<html lang="en">
<head>
    <!-- scripts -->
    <script src="../src/domkit.displays.js"></script>
    <script src="../src/domkit.styles.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bento Grid Layout - DOMKit</title>
</head>
<body>
    <h1 class="element">Bento Grid Layout Example</h1>
    <p class="element">A demonstration of how DOMKit's `createGrid` function works.</p>
    <p class="element">Open up the console to check out the return value of the grid function.</p>
    <div id="theGrid"></div>

    <script>
        const allElements = document.getElementsByClassName("element");
        for (let i = 0; i < allElements.length; i++) {
            centerText(allElements.item(i));
        }

        const myGrid = createGrid([0, 128, 0], [ ["box1", "box1", "box1"], ["box2", "box3", "box3"], ["box2", "box3", "box3"] ], "10px", "100px", "100px", {boxRadius: "20px", parentID: "theGrid"});
        console.log(myGrid);
    </script>
</body>
</html>
