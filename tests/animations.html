<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="animations.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="elements" id="mySquare"></div>
    <h1 class="elements" id="myText">Hello World</h1>

    <script src="../src/styles.js"></script>
    <script src="../src/animations.js"></script>

    <script>
        const myElements = document.getElementsByClassName("elements");
        for (let i = 0; i < myElements.length; i++) {
            centerEl(myElements.item(i));
        }
        rotateAnimation("mySquare", "5s", 360, Infinity, "linear");
        slideInText("myText", "left", "2s", "easeOut");
    </script>
</body>
</html>
