<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="animations.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animations Test - DOMKit</title>
</head>
<body>
    <div class="elements" id="mySquare"></div>
    <h1 class="elements" id="myHeading">Hello World</h1>
    <p class="elements" id="myText">A demonstration of DOMKit's animations.</p>
    <h1 id="creatorName">Jessica Davies - Creator of DOMKit</h1>

    <script src="../src/styles.js"></script>
    <script src="../src/animations.js"></script>

    <script>
        const myElements = document.getElementsByClassName("elements");
        for (let i = 0; i < myElements.length; i++) {
            centerEl(myElements.item(i));
        }
        rotateAnimation("mySquare", "5s", 360, Infinity, "linear");
        textGradient("myHeading", [[255, 0, 0], [0, 255, 0]]); // gotta style that text!
        slideInText("myHeading", "left", "2s", "easeOut");
        slideInText("myText", "right", "2s", "easeOut");
        typingAnimation("creatorName", "20px", [255, 255, 255], true, 2000, true); // change typingMilisec to 500 after debugging
    </script>
</body>
</html>
