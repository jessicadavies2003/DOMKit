<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In Page - DOMKit</title>
</head>
<body>
    <h1 id="heading" style="font-size: 3rem;">Log Into Your Account</h1>

    <script src="src/elements.js"></script>
    <script src="src/styles.js"></script>
    <script>
        const myNav = createNavBar({'Home': '', 'Sign In': ''}, [66, 106, 190], {resetCSS: false});
        const signInForm = createForm("Sign In", {"Username": "text", "Password": "password", "Submit": "button"}, "10px");
        const myHeading = document.getElementById("heading");
    
        gradientBG(document.body, "90deg", "linear", [[0, 62, 128], [0, 195, 255]], "white");
        centerText(myHeading);
        centerText(signInForm, "vertical", "20px");
    </script>
</body>
</html>
